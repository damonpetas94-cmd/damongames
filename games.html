<!DOCTYPE html>

<html>
<head>
<title>DamonGames Hub</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

.top{
background:#020617;
padding:20px;
font-size:24px;
text-align:center;
border-bottom:1px solid #111;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.game{
background:#111827;
padding:15px;
margin:10px;
border-radius:12px;
width:200px;
text-align:center;
transition:0.2s;
}

.game:hover{
transform:scale(1.05);
}

button{
padding:8px 18px;
margin-top:8px;
cursor:pointer;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
}

iframe{
width:95%;
height:650px;
border:none;
margin:20px auto;
display:block;
border-radius:12px;
background:black;
}
</style>

</head>

<body>

<div class="top">
DamonGames Hub
</div>

<div class="grid">

<div class="game">
<h3>Dirtbike Games</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/dirt-bike')">Play</button>
</div>

<div class="game">
<h3>Solitaire Games</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/solitaire')">Play</button>
</div>

<div class="game">
<h3>Basketball Superstars</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/basketball-superstars')">Play</button>
</div>

<div class="game">
<h3>Go Escape</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/go-escape')">Play</button>
</div>

<div class="game">
<h3>Drive Quest</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/drive-mad')">Play</button>
</div>

<div class="game">
<h3>Space Waves</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/space-waves')">Play</button>
</div>

<div class="game">
<h3>Basketball Stars</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/basketball-stars')">Play</button>
</div>

<div class="game">
<h3>Retro Football</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/retro-bowl')">Play</button>
</div>

<div class="game">
<h3>Cars Arena</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/cars-arena')">Play</button>
</div>

<div class="game">
<h3>Sandbox City 3D</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/sandbox-city')">Play</button>
</div>

<div class="game">
<h3>Vex 3</h3>
<button onclick="loadGame('https://www.crazygames.com/embed/vex-3')">Play</button>
</div>

</div>

<iframe id="gameFrame"></iframe>

<script>
function loadGame(url){
document.getElementById("gameFrame").src = url;
window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
