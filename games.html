<!DOCTYPE html>

<html>
<head>
<title>DamonGames Hub</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.game{
background:#111;
padding:30px;
margin:15px;
border-radius:12px;
width:200px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>DamonGames Hub</h1>

<div class="grid">

<div class="game">
<h3>Fortnite</h3>
<button onclick="window.open('https://www.epicgames.com')">Play</button>
</div>

<div class="game">
<h3>Roblox</h3>
<button onclick="window.open('https://www.roblox.com')">Play</button>
</div>

<div class="game">
<h3>Minecraft</h3>
<button onclick="window.open('https://www.minecraft.net')">Play</button>
</div>

<div class="game">
<h3>Coming Soon</h3>
<button disabled>Locked</button>
</div>

</div>

</body>
</html>
