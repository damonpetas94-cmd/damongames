<!DOCTYPE html>

<html>
<head>
<title>DamonGames Hub</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
}

.game{
background:#111;
padding:20px;
margin:10px;
border-radius:12px;
width:200px;
}

iframe{
margin-top:20px;
width:90%;
height:600px;
border:none;
border-radius:12px;
}

button{
padding:10px 20px;
margin-top:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>DamonGames Hub</h1>

<div class="grid">

<div class="game">
<h3>Roblox</h3>
<button onclick="loadGame('https://now.gg/play/roblox-corporation/5349/roblox')">Play</button>
</div>

<div class="game">
<h3>Minecraft</h3>
<button onclick="loadGame('https://classic.minecraft.net')">Play</button>
</div>

<div class="game">
<h3>Browser Game</h3>
<button onclick="loadGame('https://krunker.io')">Play</button>
</div>

</div>

<iframe id="gameFrame"></iframe>

<script>
function loadGame(url){
document.getElementById("gameFrame").src = url;
}
</script>

</body>
</html>
