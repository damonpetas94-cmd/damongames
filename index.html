<!DOCTYPE html>

<html>
<head>
<title>DamonGames</title>

<style>
body {
background: #0a0a0a;
color: white;
font-family: Arial;
text-align: center;
margin-top: 120px;
}
.box {
background: #111;
padding: 40px;
border-radius: 10px;
display: inline-block;
}
input {
padding: 12px;
width: 260px;
margin-top: 15px;
background: #000;
border: 1px solid #333;
color: white;
}
button {
padding: 12px;
width: 280px;
margin-top: 20px;
background: lime;
border: none;
font-weight: bold;
cursor: pointer;
}
.success {
color: lime;
font-size: 24px;
}
</style>

</head>

<body>

<div class="box" id="loginBox">
<h1>DamonGames</h1>
<input id="key" placeholder="Enter Invite Key">
<br>
<button onclick="login()">Enter</button>
</div>

<div id="successBox" style="display:none">
<h1 class="success">ACCESS GRANTED</h1>
<p>Welcome to DamonGames</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
window.addEventListener("load", () => {

const supabase = window.supabase.createClient(
"https://qinhyibeegktldliiqcm.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbmh5aWJlZXFrdGxkbGlscWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzU2MDQsImV4cCI6MjA4OTAxMTYwNH0.QKMgKbay88cIxLVVfCm6FyiqfYYL4D_Fxy1mK2R92CU"
)

window.login = async function() {

let key = document.getElementById("key").value

let { data, error } = await supabase
.from("invite_keys")
.select("*")
.eq("key", key)
.eq("used", false)

if (error) {
alert("ERROR: " + error.message)
return
}

if (data.length > 0) {

await supabase
.from("invite_keys")
.update({ used: true })
.eq("key", key)

document.getElementById("loginBox").style.display = "none"
document.getElementById("successBox").style.display = "block"

} else {
alert("INVALID KEY")
}

}

})
</script>

</body>
</html>
